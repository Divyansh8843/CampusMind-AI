<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 320px;
      font-family: 'Inter', sans-serif;
      padding: 16px;
      background-color: #f8fafc;
      color: #0f172a;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-weight: 800;
      color: #2563eb;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: background 0.2s;
    }
    .btn:hover { background-color: #1d4ed8; }
    .btn.secondary {
      background-color: #e2e8f0;
      color: #475569;
    }
    .status {
      margin-top: 12px;
      font-size: 12px;
      color: #64748b;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>🎓</span> CampusMind Auto-Apply
  </div>
  
  <div id="job-info" style="margin-bottom: 16px; padding: 12px; background: white; border-radius: 8px; border: 1px solid #e2e8f0; display: none;">
     <strong>Detected:</strong> <span id="job-title">Scanning...</span>
  </div>

  <button id="fill-btn" class="btn">🚀 One-Click Fill</button>
  <button id="cover-btn" class="btn secondary">📝 Generate Cover Letter</button>

  <div class="status" id="status">Ready to assist.</div>

  <script src="popup.js"></script>
</body>
</html>
